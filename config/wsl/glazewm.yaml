general:
  startup_commands: []
  shutdown_commands: []
  config_reload_commands: []
  focus_follows_cursor: false
  toggle_workspace_on_refocus: false
  cursor_jump:
    enabled: true
    trigger: "monitor_focus"
  hide_method: "cloak"
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true
  inner_gap: "5px"
  outer_gap:
    top: "10px"
    right: "10px"
    bottom: "10px"
    left: "10px"

window_effects:
  focused_window:
    border:
      enabled: false
      color: "#7dcfff"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: "rounded"
    transparency:
      enabled: false
      opacity: "100%"
  other_windows:
    border:
      enabled: false
      color: "#414868"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: "rounded"
    transparency:
      enabled: false
      opacity: "98%"

window_behavior:
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: true
      shown_on_top: false

workspaces:
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
  - name: "9"

window_rules:
  - commands: ["ignore"]
    match:
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }
      - window_process: { equals: "PowerToys" }
        window_class: { regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]' }
      - window_title: { equals: "Command Palette" }
        window_class: { equals: "WinUIDesktopWin32WindowClass" }
      - window_process: { equals: "PowerToys" }
        window_title: { regex: ".*? - Peek" }
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper" }
      - window_process: { equals: "EXCEL" }
        window_class: { not_regex: "XLMAIN" }
      - window_process: { equals: "WINWORD" }
        window_class: { not_regex: "OpusApp" }
      - window_process: { equals: "POWERPNT" }
        window_class: { not_regex: "PPTFrameClass" }
      - window_process: { regex: "cod23-cod|sp23-cod|sp23-code|bootstrapper" }

  - commands: ["move --workspace 1"]
    match:
      - window_process:
          { regex: "wezterm-gui|WindowsTerminal|WindowsTerminalPreview" }

  - commands: ["move --workspace 2"]
    match:
      - window_process: { regex: "firefox|chrome|msedge|brave" }

  - commands: ["move --workspace 3"]
    match:
      - window_process: { regex: "Code|Cursor|Zed|devenv" }

  - commands: ["move --workspace 6"]
    match:
      - window_process: { regex: "Spotify|vlc|mpv|Music.UI" }

  - commands: ["set-floating --centered"]
    match:
      - window_class: { equals: "SuperfileFloat" }
      - window_process: { regex: "explorer" }
      - window_process:
          {
            regex: "Photos|Microsoft.Photos|PhotoViewer|ImageGlass|qimgv|nomacs",
          }
      - window_process: { regex: "Bitwarden|1Password|KeePassXC" }
      - window_title: { regex: "btop|yazi|Task Manager|Calculator" }
      - window_class: { regex: "ApplicationFrameWindow" }

binding_modes:
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

keybindings:
  # Window lifecycle and layout, equivalent to Hyprland SUPER+Q/T/F/P.
  - commands: ["close"]
    bindings: ["win+q"]
  - commands: ["toggle-floating --centered"]
    bindings: ["win+t", "win+shift+space"]
  - commands: ["toggle-fullscreen"]
    bindings: ["win+f"]
  - commands: ["toggle-tiling"]
    bindings: ["win+shift+t"]
  - commands: ["toggle-tiling-direction"]
    bindings: ["win+v"]
  - commands: ["toggle-minimized"]
    bindings: ["win+shift+minus"]
  - commands: ["wm-toggle-pause"]
    bindings: ["win+shift+p"]
  - commands: ["wm-reload-config"]
    bindings: ["win+shift+r"]
  - commands: ["wm-redraw"]
    bindings: ["win+shift+w"]
  - commands: ["wm-exit"]
    bindings: ["win+ctrl+shift+e"]
  - commands: ["shell-exec tsdiscon.exe"]
    bindings: ["win+shift+l"]
  # Focus navigation, matching Hyprland hjkl/arrows as closely as Windows allows.
  - commands: ["focus --direction left"]
    bindings: ["win+h", "win+left"]
  - commands: ["focus --direction right"]
    bindings: ["win+l", "win+right"]
  - commands: ["focus --direction up"]
    bindings: ["win+k", "win+up"]
  - commands: ["focus --direction down"]
    bindings: ["win+j", "win+down"]

  # Move focused window.
  - commands: ["move --direction left"]
    bindings: ["win+shift+h", "win+shift+left"]
  - commands: ["move --direction right"]
    bindings: ["win+shift+right"]
  - commands: ["move --direction up"]
    bindings: ["win+shift+k", "win+shift+up"]
  - commands: ["move --direction down"]
    bindings: ["win+shift+j", "win+shift+down"]

  # Resize mode.
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["win+ctrl+r"]
  - commands: ["resize --width -2%"]
    bindings: ["win+u"]
  - commands: ["resize --height -2%"]
    bindings: ["win+shift+i"]
  - commands: ["resize --height +2%"]
    bindings: ["win+o"]
  - commands: ["resize --width +2%"]
    bindings: ["win+p"]

  # Application launchers copied from Hyprland intent.
  - commands: ["focus --workspace 1", "shell-exec wezterm-gui.exe"]
    bindings: ["win+enter"]
  - commands:
      [
        "focus --workspace 2",
        'shell-exec cmd /c start "" "C:\Program Files\Zen Browser\zen.exe"',
      ]
    bindings: ["win+b"]
  - commands:
      [
        "focus --workspace 5",
        'shell-exec cmd /c start "" "C:\Program Files\Zen Browser\zen.exe" --private-window',
      ]
    bindings: ["win+shift+b"]
  - commands: ["shell-exec explorer.exe"]
    bindings: ["win+e"]
  - commands:
      [
        'shell-exec wezterm-gui.exe --config initial_cols=105 --config initial_rows=28 start --always-new-process --class SuperfileFloat -- wsl.exe -d Ubuntu --cd ~ /home/shahid/.nix-profile/bin/zsh -lic "cd ~/; /home/shahid/.nix-profile/bin/superfile; exec /home/shahid/.nix-profile/bin/zsh -l"',
      ]
    bindings: ["win+shift+e"]
  - commands: ['shell-exec cmd /c start "" "ms-photos:"']
    bindings: ["win+i"]
  - commands: ["shell-exec obsidian.exe"]
    bindings: ["win+shift+o"]
  - commands: ["shell-exec taskmgr.exe"]
    bindings: ["ctrl+shift+escape"]
  - commands: ["shell-exec SnippingTool.exe /clip"]
    bindings: ["win+ctrl+s"]

  # Workspace focus.
  - commands: ["focus --next-active-workspace"]
    bindings: ["win+s"]
  - commands: ["focus --recent-workspace"]
    bindings: ["win+r"]
  - commands: ["focus --workspace 1"]
    bindings: ["win+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["win+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["win+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["win+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["win+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["win+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["win+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["win+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["win+9"]

  # Move focused window to workspace and follow it, like Hyprland SUPER+SHIFT+number.
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["win+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["win+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["win+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["win+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["win+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["win+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["win+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["win+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["win+shift+9"]

  # Move workspace between monitors.
  - commands: ["move-workspace --direction left"]
    bindings: ["win+ctrl+left"]
  - commands: ["move-workspace --direction right"]
    bindings: ["win+ctrl+right"]
  - commands: ["move-workspace --direction up"]
    bindings: ["win+ctrl+up"]
  - commands: ["move-workspace --direction down"]
    bindings: ["win+ctrl+down"]
