[config]

[templates.polybar]
input_path = "templates/polybar-colors.ini"
output_path = "~/.config/polybar/colors.ini"
post_hook = "polybar-msg cmd restart 2>/dev/null || true"

[templates.rofi-shared]
input_path = "templates/rofi-shared.rasi"
output_path = "~/.config/rofi/shared.rasi"

# [templates.eww-theme]
# input_path = "templates/eww-theme.scss"
# output_path = "~/.config/eww/styles/_matugen.scss"
# post_hook = "eww -c $HOME/.config/eww reload 2>/dev/null || true"

# [templates.eww-power-icon]
# input_path = "templates/eww-power.svg"
# output_path = "~/.config/eww/assets/power.svg"
# post_hook = "eww -c $HOME/.config/eww reload 2>/dev/null || true"

[templates.dunst]
input_path = "templates/dunstrc"
output_path = "~/dotfiles/config/dunst/dunstrc"
post_hook = "if [ \"$XDG_CURRENT_DESKTOP\" = \"i3\" ] || [ \"$DESKTOP_SESSION\" = \"i3\" ]; then dunstctl reload 2>/dev/null || (pkill dunst 2>/dev/null; dunst -conf $HOME/dotfiles/config/dunst/dunstrc &); fi"

[templates.waybar-colors]
input_path = "templates/waybar-colors.css"
output_path = "~/dotfiles/config/waybar/colors.css"
post_hook = "pkill -SIGUSR2 waybar 2>/dev/null || true"

[templates.quickshell-bar-colors]
input_path = "templates/quickshell-bar-colors.qml"
output_path = "~/dotfiles/config/quickshell/bar/configuration/MatugenColors.qml"

[templates.quickshell-visualizer-colors]
input_path = "templates/quickshell-bar-colors.qml"
output_path = "~/dotfiles/config/quickshell/visualizer/configuration/MatugenColors.qml"

[templates.vicinae]
input_path = "templates/vicinae.toml"
output_path = "~/.local/share/vicinae/themes/matugen.toml"
post_hook = "vicinae theme set matugen 2>/dev/null || true"

[templates.wlogout-colors]
input_path = "templates/wlogout-colors.css"
output_path = "~/.config/wlogout/colors.css"

[templates.hyprland-borders]
input_path = "templates/hyprland-borders.conf"
output_path = "~/dotfiles/config/hypr/matugen-borders.conf"
post_hook = "hyprctl reload 2>/dev/null || true"
