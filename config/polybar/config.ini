[bar/main]
background = #1a1b26
border = 0
bottom = false
cursor-click = pointer
dim-value = 1.0
enable-ipc = true
fixed-center = true
font-0 = JetBrainsMono Nerd Font:style=Bold:size=14;4
font-1 = Font Awesome 6 Free Solid:size=13;3
font-2 = JetBrainsMono Nerd Font:style=Bold:size=16;4
font-3 = Material Design Icons Desktop:size=21;5
font-4 = JetBrainsMono Nerd Font:size=14;4
foreground = #a9b1d6
height = 64
line-color = #7aa2f7
line-size = 2
module-margin-left = 0
module-margin-right = 0
modules-center = i3
modules-left = launcher sep cpu sep memory sep disk sep tray
modules-right = mplayer power bluetooth battery sep network sep pulseaudio sep date
monitor = ${env:MONITOR:}
monitor-strict = false
offset-x = 0
offset-y = 0
override-redirect = false
padding = 4
radius = 0
separator = " "
width = 100%
wm-restack = i3

[module/battery]
adapter = AC
battery = BAT0
format-charging = <label-charging>
format-charging-prefix = "BAT "
format-charging-prefix-font = 1
format-charging-prefix-foreground = #9ece6a
format-discharging = <label-discharging>
format-discharging-prefix = "BAT "
format-discharging-prefix-font = 1
format-discharging-prefix-foreground = #bb9af7
format-full = <label-full>
format-full-prefix = "BAT "
format-full-prefix-font = 1
format-full-prefix-foreground = #9ece6a
full-at = 99
label-charging = %percentage%%
label-charging-font = 5
label-charging-padding = 1pt
label-discharging = %percentage%%
label-discharging-font = 5
label-discharging-padding = 1pt
label-full = %percentage%%
label-full-font = 5
label-full-padding = 1pt
poll-interval = 2
time-format = %H:%M
type = internal/battery

[module/bluetooth]
click-left = /home/shahid/dotfiles/config/rofi/bluetooth-launch.sh
exec = echo 󰂯
format = <label>
format-font = 1
interval = 3
label = %output%
label-foreground = #7aa2f7
label-padding-right = 2
type = custom/script

[module/cpu]
format = <label>
format-prefix = "CPU "
format-prefix-font = 1
format-prefix-foreground = #7aa2f7
interval = 0.5
label = %percentage%%
label-font = 5
label-padding = 1pt
type = internal/cpu

[module/date]
click-left = eww open --toggle date
exec = date +'%I:%M %p'
format = <label>
format-foreground = #ff9e64
interval = 1
label = %output%
type = custom/script

[module/disk]
fixed-values = true
format-mounted = <label-mounted>
format-mounted-prefix = "DISK "
format-mounted-prefix-font = 1
format-mounted-prefix-foreground = #f7768e
interval = 60
label-mounted = %used%
label-mounted-font = 5
label-mounted-padding = 1pt
mount-0 = /
type = internal/fs

[module/i3]
enable-click = true
enable-scroll = false
format = <label-state> <label-mode>
format-font = 1
label-focused = %index%
label-focused-font = 1
label-focused-foreground = #bb9af7
label-focused-padding = 2
label-separator =
label-unfocused = %index%
label-unfocused-foreground = #565f89
label-unfocused-padding = 2
label-urgent = %index%
label-urgent-foreground = #f7768e
label-urgent-padding = 2
label-visible = %index%
label-visible-foreground = #565f89
label-visible-padding = 2
pin-workspaces = true
type = internal/i3

[module/launcher]
click-left = /home/shahid/dotfiles/config/rofi/app-menu-x11-launch.sh
format = <label>
label = 
label-font = 1
label-foreground = #9ece6a
type = custom/text

[module/memory]
format = <label>
format-prefix = "RAM "
format-prefix-font = 1
format-prefix-foreground = #e0af68
interval = 3
label = %used%
label-font = 5
label-padding = 1pt
type = internal/memory

[module/mplayer]
click-left = eww open --toggle music
label = 
label-foreground = #bb9af7
label-padding = 2pt
type = custom/text

[module/network]
accumulate-stats = true
format-connected = <label-connected>
format-connected-prefix = "NET "
format-connected-prefix-font = 1
format-connected-prefix-foreground = #9ece6a
format-disconnected = <label-disconnected>
format-disconnected-prefix = "NET "
format-disconnected-prefix-font = 1
format-disconnected-prefix-foreground = #f7768e
interface-type = wireless
interval = 3
label-connected = %{A1:/home/shahid/dotfiles/config/rofi/wifi-launch.sh:}%netspeed%%{A}
label-connected-font = 5
label-connected-padding = 2pt
label-disconnected = %{A1:/home/shahid/dotfiles/config/rofi/wifi-launch.sh:}Offline%{A}
label-disconnected-font = 5
label-disconnected-padding = 2pt
type = internal/network
unknown-as-up = true

[module/next]
click-left = playerctl next
label = 
label-font = 2
label-foreground = #7aa2f7
type = custom/text

[module/play-pause]
click-left = playerctl play-pause
exec = playerctl status 2>/dev/null | grep -q 'Playing' && echo '' || echo ''
format = <label>
interval = 1
label = %output%
label-font = 2
label-foreground = #9ece6a
type = custom/script

[module/power]
click-left = /home/shahid/dotfiles/config/rofi/power-x11-launch.sh
label = 
label-foreground = #f7768e
label-padding-left = 2pt
label-padding-right = 3pt
type = custom/text

[module/prev]
click-left = playerctl previous
label = 
label-font = 2
label-foreground = #7aa2f7
type = custom/text

[module/pulseaudio]
click-right = pavucontrol
format-muted = <label-muted>
format-volume = <label-volume>
format-volume-prefix = "VOL "
format-volume-prefix-font = 1
format-volume-prefix-foreground = #7dcfff
interval = 5
label-muted = Muted
label-muted-font = 1
label-muted-foreground = #f7768e
label-muted-padding = 2pt
label-volume = %percentage%
label-volume-font = 5
label-volume-padding = 2pt
type = internal/pulseaudio
use-ui-max = true

[module/sep]
label = " "
label-foreground = #1a1b26
type = custom/text

[module/tray]
format = <tray>
format-background = #1a1b26
tray-background = #1a1b26
tray-foreground = #a9b1d6
tray-padding = 0px
tray-size = 40%
tray-spacing = 8px
type = internal/tray

[module/updates]
exec = cat $HOME/.cache/Updates.txt 2>/dev/null || echo 0
format = <label>
format-prefix = UPDATES
format-prefix-font = 1
format-prefix-foreground = #bb9af7
interval = 1
label = %output%
label-font = 5
label-padding = 2pt
type = custom/script

[settings]
compositing-background = source
compositing-border = over
compositing-foreground = over
compositing-overline = over
compositing-underline = over
pseudo-transparency = false
screenchange-reload = false
