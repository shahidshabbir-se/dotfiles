exec-once = mpvpaper -f -o "--loop --no-audio --vf=scale=1920:1080" HDMI-A-1 ~/Downloads/snow-covered-house-forest-HD-live.mp4
exec-once = mpvpaper -f -o "--loop --no-audio --vf=scale=1366:768" eDP-1 ~/Downloads/blue-haired-blind-girl.1920x1080.mp4
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/



#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 27

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.98

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    # Animation curves
bezier=easeOutBack,0.34,1.56,0.64,1
bezier=easeInBack,0.36,0,0.66,-0.56
bezier=easeInCubic,0.32,0,0.67,0
bezier=easeInOutCubic,0.65,0,0.35,1
animation=windowsIn,1,5,easeOutBack,popin
animation=windowsOut,1,5,easeInBack,popin
animation=fadeIn,0
animation=fadeOut,1,10,easeInCubic
animation=workspaces,1,4,easeInOutCubic,slide
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

touchpad {
      natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        middle_button_emulation = false
    }
  numlock_by_default = true
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = CTRL_SHIFT, ESCAPE, exec, wezterm start --class=btop -e btop
bind = $mainMod, B, exec, firefox
bind = $mainMod, X, exec, code --enable-features=UseOzonePlatform --ozone-platform=wayland
bind = $mainMod, D, exec, wezterm start -e --class=podman-tui podman-tui
bind = $mainMod, O, exec, obsidian 
bind = $mainMod + alt, p, exec, shutdown -h 0
bind = $mainMod + alt, r, exec, reboot
bind = $mainMod + alt, q, exec, sudo systemctl restart display-manager.service 
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, M, exec, spotify
bind = $mainMod, C, exec, wezterm start -- tmux new-session -A -s nvim "nvim"
bind = $mainMod SHIFT, B, exec, firefox --private-window
bind = $mainMod ALT, S, exec, grimblast copy area
bind = $mainMod SHIFT, F, exec, kitty --override initial_window_width=320 --override initial_window_height=360 -e bash -c 'nitch -f; read -p ""'
bind = $mainMod, F, togglefloating,
bind = $mainMod, A, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, W, exec, bash -c "kill -9 $(pgrep hyprpanel) || hyprpanel"
bind = SUPER, V, exec, sh ~/.config/rofi/bin/clipboard
bind = SUPER, A, exec, sh ~/.config/rofi/bin/launcher
bind = $mainMod , left, workspace, -1
bind = ALT,Tab,cyclenext, next
bind = ALT SHIFT,Tab,cyclenext, prev
bind = $mainMod , right, workspace, +1

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1
bind = $mainMod CTRL, left, workspace, e-1

exec-once = dconf write /org/gnome/desktop/interface/gtk-theme "'Catppuccin-Dark'"
exec-once = dconf write /org/gnome/desktop/interface/document-font-name "'SF Pro Display 11'"
exec-once = dconf write /org/gnome/desktop/interface/font-name "'SF Pro Display 11'"
exec-once = dconf write /org/gnome/desktop/interface/monospace-font-name "'JetBrainsMono Nerd Font 11'"
exec-once = dconf write /org/gnome/desktop/interface/gtk-theme "'Tokyonight-Dark'"
exec-once = hyprctl setcursor "catppuccin-mocha-mauve-cursors" 24
exec-once = dconf write /org/gnome/desktop/interface/cursor-size 24


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
windowrule = float, ^(xdg-desktop-portal-gtk)$
windowrulev2=noblur,class:^(Brave-browser)$

# Example windowrule v2
windowrulev2 = float, class:^(yazi)$
windowrulev2 = size 700 400, class:^(yazi)$
windowrulev2 = center, class:^(yazi)$

windowrulev2 = float, class:^(btop)$
windowrulev2 = size 800 500, class:^(btop)$
windowrulev2 = center, class:^(btop)$
windowrulev2 = float, class:^(podman-tui)$
windowrulev2 = size 1000 600, class:^(podman-tui)$
windowrulev2 = center, class:^(podman-tui)$
# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*
xwayland {
use_nearest_neighbor = false
  # force_zero_scaling = true
} 
# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
# windowrulev2 = workspace 2,class:^(zen)$
# windowrulev2 = workspace 1,class:^(nvim)$
windowrulev2 = workspace 9,class:^(Spotify)$
