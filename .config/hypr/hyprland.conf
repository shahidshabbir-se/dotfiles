################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=HDMI-A-1,1366x768@60,auto,1
monitor= HDMI-A-1,1920x1080@60,-1366x0,1.5
monitor = HDMI-A-1, addreserved, 13, 13, 23,25 
bindl = , switch:on:Lid Switch, exec, sed -i 's/^monitor= eDP-1.*/monitor= eDP-1, disabled/' ~/.config/hypr/hyprland.conf && hyprctl reload
bindl = , switch:off:Lid Switch, exec, sed -i 's/^monitor= eDP-1.*/monitor= eDP-1,1366x768@60,0x0,1/' ~/.config/hypr/hyprland.conf && hyprctl reload


bindl = , switch:on:Lid Switch, exec, pkill -9 mpvpaper; mpvpaper -f -o "--loop --no-audio --vf=scale=1920:1080" HDMI-A-1 ~/Pictures/Wallpapers/videos/video_013.mp4 &
bindl = , switch:off:Lid Switch, exec, pkill -9 mpvpaper; mpvpaper -f -o "--loop --no-audio --vf=scale=1366:768" eDP-1 ~/Pictures/Wallpapers/videos/video_006.mp4 &
exec-once = mpvpaper -f -o "--loop --no-audio --vf=scale=1366:768" eDP-1 ~/Pictures/Wallpapers/videos/video_006.mp4
###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = wezterm start --always-new-process
$fileManager = wezterm start  --class=yazi -e yazi
$menu = wofi --show drun


